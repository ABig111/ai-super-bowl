<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI饭碗系统 AI SUPER BOWL</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,"PingFang SC","Microsoft YaHei","Helvetica Neue",sans-serif;background:#161210;color:#eee;overflow:hidden;height:100vh;width:100vw}
#header{position:fixed;top:0;left:0;right:0;z-index:100;padding:0 20px;display:flex;justify-content:space-between;align-items:center;background:rgba(18,16,12,0.97);backdrop-filter:blur(10px);border-bottom:1px solid #2a2520;height:72px;gap:16px}
.logo-group{display:flex;align-items:center;gap:12px;flex-shrink:0}
.bowl-img{height:52px;width:auto;filter:drop-shadow(0 3px 8px rgba(0,0,0,0.7));object-fit:contain}
.title-row{display:flex;align-items:baseline;gap:12px;flex-shrink:0}
.title-cn{font-size:32px;font-weight:900;letter-spacing:1px;line-height:1;text-shadow:0 1px 0 rgba(255,255,255,0.1),0 2px 0 rgba(0,0,0,0.8),0 4px 8px rgba(0,0,0,0.5)}
.title-cn .w{color:#f5f5f5}
.title-cn .accent{color:#ef4444;text-shadow:0 1px 0 #7f1d1d,0 2px 0 rgba(80,10,10,0.8),0 0 28px rgba(239,68,68,0.2)}
.title-en{font-family:Georgia,"Times New Roman",serif;font-size:22px;font-style:italic;font-weight:700;color:#f59e0b;text-shadow:0 0 12px rgba(245,158,11,0.3);letter-spacing:1px;line-height:1}
.search-wrap{flex:1;max-width:360px;position:relative}
.search-wrap input{width:100%;padding:9px 14px 9px 36px;border-radius:10px;border:1px solid #2a2520;background:#12100c;color:#eee;font-size:13px;outline:none;transition:border 0.2s}
.search-wrap input:focus{border-color:#555;background:#1a1814}
.search-wrap input::placeholder{color:#554}
.search-wrap .icon{position:absolute;left:11px;top:50%;transform:translateY(-50%);color:#554;font-size:14px;pointer-events:none}
.search-results{position:absolute;top:100%;left:0;right:0;margin-top:6px;background:rgba(18,16,12,0.98);border:1px solid #2a2520;border-radius:12px;max-height:340px;overflow-y:auto;display:none;box-shadow:0 12px 40px rgba(0,0,0,0.7);z-index:999}
.search-results::-webkit-scrollbar{width:4px}
.search-results::-webkit-scrollbar-thumb{background:#332;border-radius:2px}
.sr-item{padding:10px 14px;cursor:pointer;border-bottom:1px solid rgba(255,255,255,0.04);display:flex;justify-content:space-between;align-items:center;transition:background 0.1s}
.sr-item:hover{background:rgba(255,255,255,0.05)}
.sr-item:last-child{border-bottom:none}
.sr-name{font-size:14px;font-weight:600;color:#eee}
.sr-sub{font-size:11px;color:#665;margin-top:2px}
.sr-score{font-size:18px;font-weight:800;flex-shrink:0;margin-left:12px}
.sr-label{padding:8px 14px;font-size:11px;color:#554;border-bottom:1px solid rgba(255,255,255,0.04)}
#stats-bar{display:flex;gap:18px;font-size:11px;color:#665;flex-shrink:0}
#stats-bar .v{color:#aa9;font-weight:600}
#treemap-container{position:fixed;top:72px;left:0;right:0;bottom:0}
canvas{display:block;width:100%;height:100%}
#tooltip{position:fixed;z-index:200;pointer-events:none;background:rgba(14,12,10,0.97);border:1px solid rgba(255,255,255,0.1);border-radius:14px;padding:18px 22px;max-width:420px;min-width:300px;box-shadow:0 16px 48px rgba(0,0,0,0.8);display:none;font-size:13px;line-height:1.5;backdrop-filter:blur(16px)}
.tt-head{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:6px;gap:12px}
.tt-name{font-size:18px;font-weight:700;color:#fff;flex:1;line-height:1.3}
.tt-score-badge{font-size:32px;font-weight:900;line-height:1}
.tt-cat{font-size:11px;color:#665;margin-bottom:12px;padding-bottom:10px;border-bottom:1px solid rgba(255,255,255,0.06)}
.tt-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:4px 12px}
.tt-cell{display:flex;justify-content:space-between;font-size:12px;padding:3px 0}
.tt-cell .l{color:#554}
.tt-cell .r{color:#ccc;font-weight:500}
.tt-bar-wrap{width:100%;height:3px;background:#1e1c18;border-radius:2px;margin:10px 0 4px;overflow:hidden}
.tt-bar-fill{height:100%;border-radius:2px}
.tt-desc{font-size:11px;color:#776;line-height:1.65;margin-top:10px;padding-top:10px;border-top:1px solid rgba(255,255,255,0.05);display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden}
#detail-overlay{position:fixed;top:0;left:0;right:0;bottom:0;z-index:300;display:none;background:rgba(0,0,0,0.6);backdrop-filter:blur(4px)}
#detail-box{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:560px;max-width:94vw;max-height:90vh;overflow-y:auto;background:#16140f;border:1px solid #2a2520;border-radius:20px;padding:32px;box-shadow:0 24px 80px rgba(0,0,0,0.7)}
#detail-box::-webkit-scrollbar{width:4px}
#detail-box::-webkit-scrollbar-thumb{background:#332;border-radius:2px}
.db-close{position:absolute;top:16px;right:16px;width:32px;height:32px;border-radius:50%;background:#221;color:#665;border:none;font-size:15px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all 0.15s}
.db-close:hover{background:#443;color:#fff}
.db-top{display:flex;align-items:flex-end;gap:16px;margin-bottom:16px}
.db-score{font-size:72px;font-weight:900;line-height:1}
.db-meta{flex:1;padding-bottom:8px}
.db-score-label{font-size:10px;color:#443;letter-spacing:1px;text-transform:uppercase;margin-bottom:6px}
.db-title{font-size:22px;font-weight:700;line-height:1.3}
.db-cat{font-size:12px;color:#665;margin-top:4px}
.db-bar{width:100%;height:6px;background:#1e1c18;border-radius:3px;overflow:hidden;margin-bottom:20px}
.db-bar-fill{height:100%;border-radius:3px}
.db-info-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:18px}
.db-info-item{background:#1e1c16;border-radius:10px;padding:12px 14px}
.db-info-item .label{font-size:10px;color:#554;margin-bottom:3px}
.db-info-item .val{font-size:15px;font-weight:600;color:#ddd}
.db-desc{font-size:13.5px;color:#998;line-height:1.9;padding:16px 18px;background:#12100c;border-radius:12px;margin-bottom:6px}
.ai-section{margin-top:20px;padding-top:18px;border-top:1px solid #2a2520}
.ai-section h3{font-size:15px;margin-bottom:12px;color:#ddd}
.ai-solution{padding:16px 18px;background:#12100c;border-radius:12px;font-size:13.5px;color:#aa9;line-height:1.9}
.ai-tag{display:inline-block;padding:2px 8px;border-radius:4px;font-size:11px;font-weight:600;margin-bottom:8px}
.ai-tag.high{background:rgba(185,28,28,0.2);color:#ef4444}
.ai-tag.med{background:rgba(161,98,7,0.2);color:#eab308}
.ai-tag.low{background:rgba(22,163,74,0.2);color:#22c55e}
.db-salary-note{font-size:10px;color:#443;margin-top:4px}
</style>
</head>
